name: Install and run tests

on: [push, pull_request] 

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff 

      - name: Run Ruff
        run: ruff check . --output-format=github
  
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Last release of each JAX major version; update when new majors ship (~every 2-3 months)
        jax-version: ["0.7.2", "0.8.3", "0.9.1", ""]  # "" = latest unpinned

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Pin JAX version
        if: ${{ matrix.jax-version != '' }}
        run: pip install "jax==${{ matrix.jax-version }}"

      - name: Run pytest
        run: |
          pip install pytest
          python -m pytest tests/ --junitxml=junit/test-results-jax${{ matrix.jax-version || 'latest' }}.xml

      - name: Upload pytest test results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-jax${{ matrix.jax-version || 'latest' }}
          path: junit/test-results-jax${{ matrix.jax-version || 'latest' }}.xml
        if: ${{ always() }}
